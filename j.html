    rgba(255,255,255,0.03) 1px,

  50% { opacity: 0.8; }
  52% { opacity: 0.4; }
  55% { opacity: 1; }
}

  padding: 20px;
  white-space: pre-wrap;
  font-size: 16px;

  const div = document.createElement("div");
  div.className = "node damaged";
  div.textContent = label;

  screen.innerHTML = "";
  let i = 0;

  function step() {
    if (i < text.length) {
      const span = document.createElement("span");

      let char = text[i];

      if (Math.random() < 0.02) {
        char = ["█","▓","▒","░"][Math.floor(Math.random()*4)];
      }

      span.textContent = char;
      screen.appendChild(span);

      i++;
      setTimeout(step, 15 + Math.random()*35);
    } else {
      if (cb) cb(); // <-- IMPORTANT: we will NOT auto-menu anymore
    }
  }

  step();
